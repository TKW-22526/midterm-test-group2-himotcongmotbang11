<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Thông Tin Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <h2 class="text-center mb-4 text-primary fw-bold">TRA CỨU THÔNG TIN SẢN PHẨM</h2>

        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <div class="input-group shadow-sm">
                    <input type="text" id="txtKeyword" class="form-control" placeholder="Nhập tên sản phẩm cần tìm...">
                    <button class="btn btn-primary" type="button" id="btnSearch">Tìm kiếm</button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center" id="resultContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
